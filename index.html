<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Python IDE su Failų Valdymu ir Taisyklėmis</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet" />
<!-- CodeMirror CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/lib/codemirror.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/theme/dracula.css" />
<style>
  /* Bendra stilių dalis */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Fira Code', monospace;
    background-color: #121212;
    color: #ccc;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 10px;
  }

  /* Antraštė */
  header {
    display: flex; justify-content: space-between; align-items: center;
    background-color: #222; padding: 10px; border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
  }
  .title { color: #61dafb; font-size: 1.2rem; }

  /* Mygtukų dalis */
  .header-buttons button {
    margin-left: 0.5rem; background: #444; border: none; padding: 0.5rem 1rem;
    border-radius: 3px; font-size: 1rem; color: #eee; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .header-buttons button:hover { background: #61dafb; color: #222; }

  /* Pagrindinis layout */
  .main {
    display: flex; flex: 1; margin-top: 10px; gap: 10px;
  }

  /* Failų naršymas */
  .sidebar {
    width: 220px; background: #1e1e2f; border-radius: 8px; padding: 1rem; overflow-y: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
  }
  #fileList { list-style: none; margin-top: 10px; }
  #fileList li {
    padding: 0.5rem; cursor: pointer; border-radius: 5px; display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
    background-color: #2d2d3a;
    transition: background 0.2s;
  }
  #fileList li:hover { background-color: #444; }

  /* Failo šalinti mygtukas */
  .del-btn {
    background: #a00; color: #fff; border: none; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 0.8rem;
  }

  /* Redaktorius + rezultatai */
  .editor-output {
    flex: 1; display: flex; flex-direction: column;
  }

  /* Redaktorius */
  .editor-container {
    flex: 1; background-color: #1e1e2f; padding: 10px; border-radius: 8px; display: flex; flex-direction: column;
  }
  .CodeMirror { height: 100%; border-radius: 4px; border: 1px solid #444; }

  /* Rezultatų langas */
  #results {
    height: 150px; background: #222; color: #eee; margin-top: 10px; padding: 10px; border-radius: 8px; overflow-y: auto; font-family: monospace; white-space: pre-wrap;
  }

  /* Taisyklės kaip blokai */
  .rules-container {
    display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px;
  }
  .rule-card {
    background-color: #2d2d3a; padding: 15px; border-radius: 10px; width: calc(33% - 20px);
    box-shadow: 0 0 8px rgba(0,0,0,0.5);
    display: flex; flex-direction: column; height: auto;
  }
  .rule-card h4 {
    color: #61dafb; margin-bottom: 10px; font-size: 1.1rem;
  }
  .rule-text {
    font-size: 0.9rem; line-height: 1.4; color: #ccc;
  }

  /* Mygtukas "Taisyklės" apačioje kairėje */
  #rulesBtn {
    margin-top: 15px; padding: 0.6rem 1.2rem; background: #444; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; color: #eee;
  }
  #rulesBtn:hover { background: #61dafb; color: #222; }

  /* Modal langas taisyklėms */
  #rulesOverlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
  }
  #rulesModal {
    background: #222; color: #eee; padding: 20px; border-radius: 8px; max-width: 90%; max-height: 80%; overflow-y: auto;
  }
  #rulesClose {
    margin-top: 15px; padding: 0.7rem 1.4rem; background: #444; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; color: #eee;
  }
  #rulesClose:hover { background: #61dafb; color: #222; }

  /* Responsyvus */
  @media(max-width: 1024px) {
    .rule-card {
      width: calc(50% - 20px);
    }
  }
  @media(max-width: 768px) {
    .rule-card {
      width: 100%;
    }
    .main { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="title">Python IDE su Failų Valdymu</div>
  <div class="header-buttons">
    <button id="runBtn">Vykdyti</button>
    <button id="resetBtn">Perkrauti</button>
    <button id="clearBtn">Valyti</button>
    <button id="downloadBtn">Atsisiųsti</button>
  </div>
</header>

<div class="main">
  <!-- Failų naršymas -->
  <div class="sidebar">
    <h4>Failai</h4>
    <button id="newFile">Naujas failas</button>
    <ul id="fileList"></ul>
  </div>
  <!-- Redaktorius + rezultatai + taisyklės -->
  <div class="editor-output">
    <div class="editor-container">
      <textarea id="code"></textarea>
    </div>
    <div id="results">Čia bus rodomas vykdyto kodo rezultatas</div>
    <button id="showRules" style="margin-top:10px;">Taisyklės</button>
    <!-- Taisyklės kaip blokeliai -->
    <div class="rules-container" id="rulesContainer"></div>
  </div>
</div>

<!-- Taisyklės modalas -->
<div id="rulesOverlay">
  <div id="rulesModal">
    <h3>Taisyklės ir Patarimai</h3>
    <div id="rulesContent" style="white-space: pre-wrap; max-height: 60vh; overflow-y:auto;"></div>
    <button id="rulesClose">Uždaryti</button>
  </div>
</div>

<!-- Scriptai -->
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/mode/python/python.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/display/active-line.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/edit/closetag.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/comment/comment.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/selection/active-line.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
<script>
  // Failų sąrašas
  const files = [
    {name: 'pirmas.py', code: `print("Labas pasauli")`},
    {name: 'antras.py', code: `for i in range(3):\n    print("Skaičius", i)`},
  ];

  const fileListUl = document.getElementById('fileList');

  // Failų sąrašo atnaujinimas
  function refreshFileList() {
    fileListUl.innerHTML = '';
    files.forEach((file, index) => {
      const li = document.createElement('li');
      li.textContent = file.name;
      // Failo pasirinkimas
      li.onclick = () => loadFile(index);
      // Šalinti mygtukas
      const delBtn = document.createElement('button');
      delBtn.textContent = 'Šalinti';
      delBtn.className = 'del-btn';
      delBtn.onclick = (e) => {
        e.stopPropagation();
        if (confirm(`Ar tikrai norite ištrinti "${file.name}"?`)) {
          files.splice(index, 1);
          refreshFileList();
        }
      };
      li.appendChild(delBtn);
      fileListUl.appendChild(li);
    });
  }

  function loadFile(index) {
    editor.setValue(files[index].code);
  }

  document.getElementById('newFile').onclick = () => {
    const filename = prompt('Naujo failo pavadinimas:', 'naujas.py');
    if (filename) {
      files.push({name: filename, code: ''});
      refreshFileList();
    }
  };

  // Redaktorius
  let editor;
  async function init() {
    editor = CodeMirror.fromTextArea(document.getElementById('code'), {
      mode: 'python',
      theme: 'dracula',
      lineNumbers: true,
      styleActiveLine: true,
      indentUnit: 4,
      indentWithTabs: false,
      lineWrapping: true,
    });
    window.pyodide = await loadPyodide();
    refreshFileList();
    if (files.length > 0) loadFile(0);
  }
  init();

  // Vykdyti kodą
document.getElementById('runBtn').onclick = async () => {
    document.getElementById('results').textContent = '';
    try {
      const code = editor.getValue();
      let result = await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()

try:
    exec("""${code}""")
    result = sys.stdout.getvalue()
finally:
    sys.stdout = sys.__stdout__

result
`);
      document.getElementById('results').textContent = result;
    } catch (err) {
      document.getElementById('results').textContent = 'Klaida: ' + err;
    }
  };

  // Valyti
document.getElementById('clearBtn').onclick = () => {
    editor.setValue('');
    document.getElementById('results').textContent = '';
  };

  // Pavyzdinis kodas
document.getElementById('exampleBtn').onclick = () => {
    editor.setValue(`# Pavyzdinis Python kodas
for i in range(3):
    print("Skaičius", i)
`);
  };

  // Atsisiuntimas
document.getElementById('downloadBtn').onclick = () => {
    const code = editor.getValue();
    const blob = new Blob([code], {type: 'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mano_kodas.py';
    a.click();
    URL.revokeObjectURL(url);
  };

  // Perkrauti
document.getElementById('resetBtn').onclick = () => {
    location.reload();
  };

  // Taisyklės kaip kortelės
const taisykles = [
  {
    pavadinimas: "Komanda print()",
    aprašymas: "Išveda tekstą ekrane. Tekstas kabutėse \" \".",
    pavyzdys: 'print("Labas pasauli")'
  },
  {
    pavadinimas: "Komanda input()",
    aprašymas: "Įveda iš vartotojo.",
    pavyzdys: 'name = input("Įvesk vardą: "); print(name)'
  },
  {
    pavadinimas: "Komanda if",
    aprašymas: "Sąlyga (jei).",
    pavyzdys: 'if x > 5:\n    print("Daugiau už 5")'
  },
  {
    pavadinimas: "Komanda else",
    aprašymas: "Jei sąlyga neteisinga.",
    pavyzdys: 'else:\n    print("Mažiau")'
  },
  {
    pavadinimas: "Komanda for",
    aprašymas: "Kartojimas.",
    pavyzdys: 'for i in range(3):\n    print(i)'
  },
  {
    pavadinimas: "Komanda while",
    aprašymas: "Kartojimas kol tiesa.",
    pavyzdys: 'while i < 3:\n    print(i)\n    i += 1'
  },
  {
    pavadinimas: "Komanda def",
    aprašymas: "Funkcijos kūrimas.",
    pavyzdys: 'def sveiki():\n    print("Labas!")'
  },
  {
    pavadinimas: "Komanda return",
    aprašymas: "Grąžina rezultatą.",
    pavyzdys: 'def suma():\n    return 5 + 5'
  }
];

// Sukurti korteles
const rulesContainer = document.getElementById('rulesContainer');
taisykles.forEach(rule => {
  const card = document.createElement('div');
  card.className = 'rule-card';
  card.innerHTML = `
    <h4>${rule.pavadinimas}</h4>
    <div class="rule-text">${rule.aprašymas}</div>
    <pre style="margin-top:8px; font-family: monospace;">${rule.pavyzdys}</pre>
  `;
  rulesContainer.appendChild(card);
});

// Taisyklės lango atidarymas
document.getElementById('showRules').onclick = () => {
  document.getElementById('rulesOverlay').style.display = 'flex';
};
document.getElementById('rulesClose').onclick = () => {
  document.getElementById('rulesOverlay').style.display = 'none';
};
</script>

</body>
</html>
