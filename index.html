<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Python IDE su Failų Valdymu</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet" />
<!-- CodeMirror CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/lib/codemirror.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/theme/dracula.css" />
<style>
  body {
    font-family: 'Fira Code', monospace;
    background-color: #f0f0f0;
    margin: 20px;
    display: flex;
    flex-direction: column;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Antraštė */
  header {
    display: flex; justify-content: space-between; align-items: center;
    background-color: #282c34; padding: 0.75rem; border-radius: 5px;
  }
  .title { color: #61dafb; font-size: 1.2rem; }

  .header-buttons button {
    margin-left: 0.5rem; background: #444; border: none; padding: 0.5rem 1rem;
    border-radius: 3px; font-size: 1rem; color: #eee; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .header-buttons button:hover { background: #61dafb; color: #222; transform: translateY(-1px); }

  /* Pagrindinis layout */
  .main {
    display: flex; margin-top: 10px; gap: 10px;
  }

  /* Failų naršymas */
  .sidebar {
    width: 220px; background: #2d2d3a; border-radius: 5px; padding: 1rem; overflow-y: auto;
  }
  #fileList { list-style: none; margin-top: 10px; }
  #fileList li {
    padding: 0.5rem; cursor: pointer; border-radius: 3px; display: flex; justify-content: space-between; align-items: center;
    transition: background 0.2s;
  }
  #fileList li:hover { background: #444; }

  /* Redaktorius + outputas */
  .editor-output { flex: 1; display: flex; flex-direction: column; }
  .editor-container { flex: 1; padding: 0.5rem; background-color: #1e1e2f; display: flex; flex-direction: column; }
  .CodeMirror { height: 100%; border-radius: 4px; border: 1px solid #444; }

  /* Mygtukai po redaktoriumi */
  .bottom-buttons { display: flex; justify-content: center; gap: 1rem; padding: 0.5rem 0; }
  .bottom-buttons button { background: #444; padding: 0.55rem 1.2rem; border-radius: 3px; border: none; font-size: 1rem; color: #eee; cursor: pointer; }

  /* Tekstų blokas (Taisyklės ir Patarimai) kaip langas */
  #rulesModal {
    display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #222; color: #eee; padding: 20px; border-radius: 8px; max-width: 80%; max-height: 80%; overflow-y: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 1000;
  }
  #rulesModal.show { display: block; }
  #rulesClose {
    margin-top: 10px; display: inline-block; background: #444; border: none; padding: 0.5rem 1rem; border-radius: 3px; cursor: pointer; color: #eee;
  }
  /* Modal overlay */
  #overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999;
  }
  #overlay.show { display: block; }

  /* Failų trynimo mygtukas */
  .delete-btn {
    background: #a00; color: #fff; border: none; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-weight: bold;
    font-size: 0.9rem;
  }

  /* apatinės panelės mygtukas "Taisyklės" */
  #rulesBtn {
    margin-top: 10px; padding: 0.5rem 1rem; background: #444; border: none; border-radius: 3px; cursor: pointer; font-size: 1rem; color: #eee;
    align-self: flex-start;
  }
  #rulesBtn:hover { background: #61dafb; color: #222; }

</style>
</head>
<body>

<header>
  <div class="title">VS Code Stiliaus Python IDE</div>
  <div class="header-buttons">
    <button id="runBtn">Vykdyti</button>
    <button id="resetBtn">PERKRAUTI</button>
    <button id="clearBtn">Valyti</button>
    <button id="downloadBtn">Atsisiųsti</button>
  </div>
</header>

<div class="main">
  <!-- Failų naršymas -->
  <div class="sidebar">
    <h4>Failų naršymas</h4>
    <button id="newFile">Naujas failas</button>
    <ul id="fileList"></ul>
  </div>
  <!-- Redaktorius + outputas -->
  <div class="editor-output">
    <div class="editor-container">
      <textarea id="code"></textarea>
    </div>
    <div class="bottom-buttons">
      <button id="exampleBtn">Pavyzdys</button>
    </div>
  </div>
</div>

<!-- Taisyklės lango modalas -->
<div id="overlay"></div>
<div id="rulesModal">
  <h3>Taisyklės ir Patarimai</h3>
  <div id="rulesContent"></div>
  <button id="rulesClose">Uždaryti</button>
</div>

<!-- Scriptai -->
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/mode/python/python.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/display/active-line.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/edit/closetag.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/comment/comment.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/selection/active-line.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
<script>
  // Failų sąrašas
  const files = [
    {name: 'pirmas.py', code: `print("Labas pasauli")`},
    {name: 'antras.py', code: `for i in range(3):\n    print("Skaičius", i)`},
  ];

  const fileListUl = document.getElementById('fileList');

  function refreshFileList() {
    fileListUl.innerHTML = '';
    files.forEach((file, index) => {
      const li = document.createElement('li');
      li.textContent = file.name;
      // Redagavimo mygtukas
      const delBtn = document.createElement('button');
      delBtn.textContent = 'Šalinti';
      delBtn.className = 'delete-btn';
      delBtn.onclick = (e) => {
        e.stopPropagation();
        if (confirm(`Ar tikrai norite ištrinti "${file.name}"?`)) {
          files.splice(index, 1);
          refreshFileList();
        }
      };
      li.onclick = () => loadFile(index);
      li.appendChild(delBtn);
      fileListUl.appendChild(li);
    });
  }

  function loadFile(index) {
    editor.setValue(files[index].code);
  }

  document.getElementById('newFile').onclick = () => {
    const filename = prompt('Įveskite naujo failo pavadinimą:', 'naujas.py');
    if (filename) {
      files.push({name: filename, code: ''});
      refreshFileList();
    }
  };

  // Redaktorius
  let editor;
  async function init() {
    editor = CodeMirror.fromTextArea(document.getElementById('code'), {
      mode: 'python',
      theme: 'dracula',
      lineNumbers: true,
      styleActiveLine: true,
      indentUnit: 4,
      indentWithTabs: false,
      lineWrapping: true,
    });
    window.pyodide = await loadPyodide();
    refreshFileList();
    if (files.length > 0) loadFile(0);
  }
  init();

  const outputDiv = document.getElementById('rulesContent');

  function appendOutput(text) {
    // Galite naudoti kitą div outputui
  }

  // Vykdyti
document.getElementById('runBtn').onclick = async () => {
    outputDiv.textContent = '';
    try {
      const code = editor.getValue();
      let result = await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()

try:
    exec("""${code}""")
    result = sys.stdout.getvalue()
finally:
    sys.stdout = sys.__stdout__

result
`);
      if (result.trim() !== 'None') {
        outputDiv.textContent += result + '\n';
      }
    } catch (err) {
      outputDiv.textContent += 'Klaida: ' + err + '\n';
    }
  };

  document.getElementById('clearBtn').onclick = () => {
    editor.setValue('');
    outputDiv.textContent = '';
  };

  document.getElementById('exampleBtn').onclick = () => {
    editor.setValue(`# Pavyzdinis Python kodas
for i in range(3):
    print("Skaičius", i)
`);
  };

  document.getElementById('downloadBtn').onclick = () => {
    const code = editor.getValue();
    const blob = new Blob([code], {type: 'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mano_kodas.py';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  document.getElementById('resetBtn').onclick = () => {
    location.reload();
  };

  // Taisyklės ir Patarimai
const taisykles = `
📘 Taisyklės (Coding Commands & Rules – LT)
🧠 1. Komanda print()
Paskirtis: išveda tekstą ekrane
💡 Taisyklė: Tekstas visada kabutėse " "
📌 Pavyzdys: print("Labas pasauli")
🔤 2. Komanda input()
Paskirtis: įvestis iš vartotojo
📌 Pavyzdys: name = input("Įvesk vardą: "); print(name)
⚖️ 3. Komanda if
Paskirtis: sąlyga (jei)
📌 Pavyzdys: if x > 5: print("Daugiau už 5")
🔁 4. Komanda else
Paskirtis: jei sąlyga neteisinga
📌 Pavyzdys: else: print("Mažiau")
🔀 5. Komanda elif
Paskirtis: papildoma sąlyga
📌 Pavyzdys: elif x > 5: print("Vidutinis")
🔄 6. Komanda for
Paskirtis: kartoja veiksmus
📌 Pavyzdys: for i in range(3): print(i)
🔁 7. Komanda while
Paskirtis: kartoja kol tiesa
📌 Pavyzdys: while i < 3: print(i); i += 1
🧩 8. Komanda def
Paskirtis: kuria funkciją
📌 Pavyzdys: def sveiki(): print("Labas!")
📤 9. Komanda return
Paskirtis: grąžina rezultatą
📌 Pavyzdys: def suma(): return 5 + 5
⚠️ Svarbios taisyklės, programavimo patarimai...
`;

document.getElementById('rulesContent').innerHTML = taisykles;

  // Mygtukas atidaryti taisyklių langą
  document.getElementById('rulesBtn')?.addEventListener('click', () => {
    document.getElementById('overlay').classList.add('show');
    document.getElementById('rulesModal').classList.add('show');
  });

  document.getElementById('rulesClose')?.addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('rulesModal').classList.remove('show');
  });
</script>
<!-- Mygtukas papildomai -->
<button id="rulesBtn" style="margin-top:10px;">Taisyklės</button>
</body>
</html>
