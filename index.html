<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Python IDE su Failų Valdymu</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet" />
<!-- CodeMirror CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/lib/codemirror.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/theme/dracula.css" />
<style>
  /* Bendra stilių dalis */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Fira Code', monospace;
    background-color: #121212;
    color: #ccc;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 10px;
  }

  /* Antraštė */
  header {
    display: flex; justify-content: space-between; align-items: center;
    background-color: #222; padding: 10px; border-radius: 5px;
  }
  .title { color: #61dafb; font-size: 1.2rem; }

  /* Mygtukų dalis */
  .header-buttons button {
    margin-left: 0.5rem; background: #444; border: none; padding: 0.5rem 1rem;
    border-radius: 3px; font-size: 1rem; color: #eee; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .header-buttons button:hover { background: #61dafb; color: #222; }

  /* Pagrindinis layout */
  .main {
    display: flex; flex: 1; margin-top: 10px; gap: 10px;
  }

  /* Failų naršymas */
  .sidebar {
    width: 220px; background: #1e1e2f; border-radius: 5px; padding: 1rem; overflow-y: auto;
  }
  #fileList { list-style: none; margin-top: 10px; }
  #fileList li {
    padding: 0.5rem; cursor: pointer; border-radius: 3px; display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 5px;
    background-color: #2d2d3a;
    transition: background 0.2s;
  }
  #fileList li:hover { background-color: #444; }

  /* Failo mygtukas šalinti */
  .del-btn {
    background: #a00; color: #fff; border: none; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 0.8rem;
  }

  /* Redaktorius + rezultatų langas */
  .editor-output {
    flex: 1; display: flex; flex-direction: column;
  }

  /* Redaktorius */
  .editor-container {
    flex: 1; background-color: #1e1e2f; padding: 10px; border-radius: 5px; display: flex; flex-direction: column;
  }
  .CodeMirror { height: 100%; border-radius: 4px; border: 1px solid #444; }

  /* Apatinė dalis - vykdymo rezultatai */
  #results {
    height: 150px; background: #222; color: #eee; margin-top: 10px; padding: 10px; border-radius: 5px; overflow-y: auto; font-family: monospace; white-space: pre-wrap;
  }

  /* Mygtukas "Taisyklės" apačioje kairėje */
  #rulesBtn {
    margin-top: 10px; padding: 0.5rem 1rem; background: #444; border: none; border-radius: 3px; cursor: pointer; font-size: 1rem; color: #eee;
  }
  #rulesBtn:hover { background: #61dafb; color: #222; }

  /* Taisyklės lango modalas */
  #rulesOverlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
  }
  #rulesModal {
    background: #222; color: #eee; padding: 20px; border-radius: 8px; max-width: 80%; max-height: 80%; overflow-y: auto;
  }
  #rulesClose {
    margin-top: 10px; padding: 0.5rem 1rem; background: #444; border: none; border-radius: 3px; cursor: pointer; color: #eee;
  }
  #rulesClose:hover { background: #61dafb; color: #222; }

  /* Responsive */
  @media(max-width: 768px) {
    .main { flex-direction: column; }
    .sidebar { width: 100%; height: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="title">Python IDE su Failų Valdymu</div>
  <div class="header-buttons">
    <button id="runBtn">Vykdyti</button>
    <button id="resetBtn">Perkrauti</button>
    <button id="clearBtn">Valyti</button>
    <button id="downloadBtn">Atsisiųsti</button>
  </div>
</header>

<div class="main">
  <!-- Failų naršymas -->
  <div class="sidebar">
    <h4>Failai</h4>
    <button id="newFile">Naujas failas</button>
    <ul id="fileList"></ul>
  </div>
  <!-- Redaktorius + rezultatai -->
  <div class="editor-output">
    <div class="editor-container">
      <textarea id="code"></textarea>
    </div>
    <div id="results">Čia bus rodomas vykdyto kodo rezultatas</div>
    <button id="showRules" style="margin-top:10px;">Taisyklės</button>
  </div>
</div>

<!-- Taisyklės lango modalas -->
<div id="rulesOverlay">
  <div id="rulesModal">
    <h3>Taisyklės ir Patarimai</h3>
    <div id="rulesContent" style="white-space: pre-wrap; max-height: 60vh; overflow-y:auto;"></div>
    <button id="rulesClose">Uždaryti</button>
  </div>
</div>

<!-- Scriptai -->
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/mode/python/python.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/display/active-line.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/edit/closetag.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/comment/comment.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.13/addon/selection/active-line.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
<script>
  // Failų sąrašas
  const files = [
    {name: 'pirmas.py', code: `print("Labas pasauli")`},
    {name: 'antras.py', code: `for i in range(3):\n    print("Skaičius", i)`},
  ];

  const fileListUl = document.getElementById('fileList');

  // Failų sąrašo atnaujinimas
  function refreshFileList() {
    fileListUl.innerHTML = '';
    files.forEach((file, index) => {
      const li = document.createElement('li');
      li.textContent = file.name;
      // Failo pasirinkimas
      li.onclick = () => loadFile(index);
      // Šalinti mygtukas
      const delBtn = document.createElement('button');
      delBtn.textContent = 'Šalinti';
      delBtn.className = 'del-btn';
      delBtn.onclick = (e) => {
        e.stopPropagation();
        if (confirm(`Ar tikrai norite ištrinti "${file.name}"?`)) {
          files.splice(index, 1);
          refreshFileList();
        }
      };
      li.appendChild(delBtn);
      fileListUl.appendChild(li);
    });
  }

  function loadFile(index) {
    editor.setValue(files[index].code);
  }

  document.getElementById('newFile').onclick = () => {
    const filename = prompt('Naujo failo pavadinimas:', 'naujas.py');
    if (filename) {
      files.push({name: filename, code: ''});
      refreshFileList();
    }
  };

  // Redaktorius
  let editor;
  async function init() {
    editor = CodeMirror.fromTextArea(document.getElementById('code'), {
      mode: 'python',
      theme: 'dracula',
      lineNumbers: true,
      styleActiveLine: true,
      indentUnit: 4,
      indentWithTabs: false,
      lineWrapping: true,
    });
    window.pyodide = await loadPyodide();
    refreshFileList();
    if (files.length > 0) loadFile(0);
  }
  init();

  // Vykdyti kodą
document.getElementById('runBtn').onclick = async () => {
    document.getElementById('results').textContent = '';
    try {
      const code = editor.getValue();
      let result = await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()

try:
    exec("""${code}""")
    result = sys.stdout.getvalue()
finally:
    sys.stdout = sys.__stdout__

result
`);
      document.getElementById('results').textContent = result;
    } catch (err) {
      document.getElementById('results').textContent = 'Klaida: ' + err;
    }
  };

  // Valyti
document.getElementById('clearBtn').onclick = () => {
    editor.setValue('');
    document.getElementById('results').textContent = '';
  };

  // Pavyzdinis kodas
document.getElementById('exampleBtn').onclick = () => {
    editor.setValue(`# Pavyzdinis Python kodas
for i in range(3):
    print("Skaičius", i)
`);
  };

  // Atsisiuntimas
document.getElementById('downloadBtn').onclick = () => {
    const code = editor.getValue();
    const blob = new Blob([code], {type: 'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mano_kodas.py';
    a.click();
    URL.revokeObjectURL(url);
  };

  // Perkrauti
document.getElementById('resetBtn').onclick = () => {
    location.reload();
  };

  // Taisyklės ir Patarimai
const taisykles = `
📘 Taisyklės (Coding Commands & Rules – LT)
🧠 1. Komanda print()
Paskirtis: išveda tekstą ekrane
💡 Taisyklė: Tekstas visada kabutėse " "
📌 Pavyzdys: print("Labas pasauli")
🔤 2. Komanda input()
Paskirtis: įvestis iš vartotojo
📌 Pavyzdys: name = input("Įvesk vardą: "); print(name)
⚖️ 3. Komanda if
Paskirtis: sąlyga (jei)
📌 Pavyzdys: if x > 5: print("Daugiau už 5")
🔁 4. Komanda else
Paskirtis: jei sąlyga neteisinga
📌 Pavyzdys: else: print("Mažiau")
🔀 5. Komanda elif
Paskirtis: papildoma sąlyga
📌 Pavyzdys: elif x > 5: print("Vidutinis")
🔄 6. Komanda for
Paskirtis: kartoja veiksmus
📌 Pavyzdys: for i in range(3): print(i)
🔁 7. Komanda while
Paskirtis: kartoja kol tiesa
📌 Pavyzdys: while i < 3: print(i); i += 1
🧩 8. Komanda def
Paskirtis: kuria funkciją
📌 Pavyzdys: def sveiki(): print("Labas!")
📤 9. Komanda return
Paskirtis: grąžina rezultatą
📌 Pavyzdys: def suma(): return 5 + 5
⚠️ Svarbios taisyklės, programavimo patarimai...
`;

document.getElementById('rulesContent').innerText = taisykles;

  // Mygtukas atidaryti taisyklių langą
  document.getElementById('showRules').onclick = () => {
    document.getElementById('rulesOverlay').style.display = 'flex';
  };

  document.getElementById('rulesClose').onclick = () => {
    document.getElementById('rulesOverlay').style.display = 'none';
  };
</script>

</body>
</html>
